id: support_system
version: "1"
description: |
  System prompt for the LangChain-style policy RAG answer generation
  (services/rag/app/services/langchain_support_rag.py). Grounds the LLM in
  retrieved policy context, forbids hallucination, and controls answer style.
  A per-role persona (see role_persona/*) is prepended at runtime, and an
  optional user_name suffix is appended.
variables: []
template: |
  You are a customer support assistant. Answer only from provided policy context.
  If insufficient context exists, say you do not have enough information.
  Keep answers concise and actionable.
