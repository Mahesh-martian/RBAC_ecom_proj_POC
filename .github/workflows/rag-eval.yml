name: RAG Eval (RAGAS)

# Full-scored RAGAS evaluation of the policy RAG pipeline against the golden
# dataset in tests/rag_qa_validation.json. This workflow calls Azure OpenAI and
# Azure AI Search, so it consumes API quota — it runs on a nightly schedule
# against main and can be triggered manually from the Actions tab.
#
# PR builds do NOT run this workflow; a cheap dry-run plumbing check lives in
# ci.yml so PRs stay fast and free.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   AZURE_OPENAI_API_KEY
#   AZURE_OPENAI_ENDPOINT
#   AZURE_OPENAI_CHAT_DEPLOYMENT
#   AZURE_OPENAI_EMBEDDING_DEPLOYMENT
#   AZURE_SEARCH_ADMIN_KEY
#   AZURE_SEARCH_ENDPOINT
#   AZURE_SEARCH_INDEX_NAME
# Optional (used when an Azure AI Foundry embedding endpoint is preferred):
#   AZURE_EMBEDDING_API_KEY
#   AZURE_EMBEDDING_ENDPOINT
# Optional (dedicated judge model, e.g. gpt-4o-mini):
#   RAGAS_JUDGE_DEPLOYMENT (repository variable is fine here)

on:
  schedule:
    # Daily 06:00 UTC (~11:30 IST). Adjust to when Azure quota is quietest.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max cases to evaluate (blank = all)"
        required: false
        default: ""
      role:
        description: "Filter cases whose roles_allowed includes this role"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - customer
          - vendor
          - admin
      include_stretch:
        description: "Also run stretch_cases (documented retrieval gaps)"
        required: false
        default: false
        type: boolean
      fail_on_threshold:
        description: "Fail the workflow when any row is below threshold"
        required: false
        default: true
        type: boolean

concurrency:
  group: rag-eval-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ragas-eval:
    name: RAGAS full-scored eval
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: services/rag
    env:
      ENVIRONMENT: ci
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      # RAG service settings sourced from repo secrets. The evaluator runs
      # in-process, so no docker-compose stack is needed.
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
      AZURE_OPENAI_API_VERSION: "2024-12-01-preview"
      AZURE_SEARCH_ADMIN_KEY: ${{ secrets.AZURE_SEARCH_ADMIN_KEY }}
      AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
      AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}
      AZURE_SEARCH_SEMANTIC_CONFIG: "support-semantic"
      AZURE_SEARCH_VECTOR_DIMENSIONS: "1536"
      AZURE_EMBEDDING_API_KEY: ${{ secrets.AZURE_EMBEDDING_API_KEY }}
      AZURE_EMBEDDING_ENDPOINT: ${{ secrets.AZURE_EMBEDDING_ENDPOINT }}
      RAGAS_JUDGE_DEPLOYMENT: ${{ vars.RAGAS_JUDGE_DEPLOYMENT }}
      RAGAS_ENABLED: "true"
      # Threshold gate; defaults come from app/config.py and may be tuned via
      # repository variables to avoid PR churn.
      RAGAS_MIN_FAITHFULNESS: ${{ vars.RAGAS_MIN_FAITHFULNESS || '0.7' }}
      RAGAS_MIN_ANSWER_RELEVANCY: ${{ vars.RAGAS_MIN_ANSWER_RELEVANCY || '0.7' }}
      RAGAS_MIN_CONTEXT_PRECISION: ${{ vars.RAGAS_MIN_CONTEXT_PRECISION || '0.6' }}
      RAGAS_MIN_CONTEXT_RECALL: ${{ vars.RAGAS_MIN_CONTEXT_RECALL || '0.6' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          # LangChain wrappers RAGAS uses for the Azure judge model.
          pip install langchain-openai==0.2.14

      - name: Verify Azure credentials present
        run: |
          missing=""
          for var in AZURE_OPENAI_API_KEY AZURE_OPENAI_ENDPOINT \
                     AZURE_OPENAI_CHAT_DEPLOYMENT AZURE_OPENAI_EMBEDDING_DEPLOYMENT \
                     AZURE_SEARCH_ADMIN_KEY AZURE_SEARCH_ENDPOINT AZURE_SEARCH_INDEX_NAME; do
            if [ -z "${!var}" ]; then
              missing="$missing $var"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "The scheduled RAG eval requires these repo secrets. See the header of"
            echo ".github/workflows/rag-eval.yml for the full list."
            exit 1
          fi

      - name: Build ragas_eval args
        id: args
        run: |
          args=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            args="$args --limit ${{ github.event.inputs.limit }}"
          fi
          if [ -n "${{ github.event.inputs.role }}" ]; then
            args="$args --role ${{ github.event.inputs.role }}"
          fi
          if [ "${{ github.event.inputs.include_stretch }}" = "true" ]; then
            args="$args --include-stretch"
          fi
          # Scheduled runs and dispatch runs both default to fail-on-threshold=true.
          if [ "${{ github.event.inputs.fail_on_threshold || 'true' }}" = "true" ]; then
            args="$args --fail-on-threshold"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"
          echo "Resolved args: $args"

      - name: Run RAGAS evaluation
        run: |
          python scripts/ragas_eval.py --verbose ${{ steps.args.outputs.args }}

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-report-${{ github.run_number }}
          path: services/rag/reports/ragas/
          if-no-files-found: warn
          retention-days: 30

      - name: Post job summary
        if: always()
        run: |
          shopt -s nullglob
          # Latest report folder (there's only one per run).
          for md in services/rag/reports/ragas/*/report.md; do
            {
              echo "## RAGAS Report"
              echo ""
              cat "$md"
            } >> "$GITHUB_STEP_SUMMARY"
          done
